# Single container: SQLite file persisted under ./data
services:
  app:
    build:
      env_file: .env
      context: .
      args:
        NODE_ENV: development
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/app.db}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
    networks:
      - shared-tunnel-net
    volumes:
      - .:/app
      - app-data:/app/data
    command: sh -c "npm install && npm run start"

volumes:
  app-data:
networks:
  shared-tunnel-net:
    external: true
