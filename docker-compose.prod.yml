# SQLite on a named volume or bind-mount SQLITE_PATH on the host.
services:
  app:
    build:
      env_file: .env
      context: .
      args:
        NODE_ENV: production
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/app.db}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - shared-tunnel-net
    volumes:
      - app-data:/app/data
    command: npm run start:prod
    restart: unless-stopped

volumes:
  app-data:
networks:
  shared-tunnel-net:
    external: true
